<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VulnChain -- {% block title %}Dashboard{% endblock %}</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">Vuln<span>Chain</span></div>
  <div class="sidebar-user">
    <div class="sidebar-user-avatar">{{ username[0].upper() }}</div>
    <div>
      <div class="sidebar-username">{{ username }}</div>
      <div class="sidebar-role">Security Analyst</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="/dashboard"       class="nav-item {% if active=='dashboard' %}active{% endif %}">
      <span class="nav-icon">&#9632;</span> Overview
    </a>
    <a href="/upload"          class="nav-item {% if active=='upload' %}active{% endif %}">
      <span class="nav-icon">&#8679;</span> Run Scan
    </a>
    <a href="/graph"           class="nav-item {% if active=='graph' %}active{% endif %}">
      <span class="nav-icon">&#9903;</span> Attack Graph
    </a>
    <a href="/vulnerabilities" class="nav-item {% if active=='vulns' %}active{% endif %}">
      <span class="nav-icon">&#9888;</span> Vulnerabilities
    </a>
    <a href="/reports"         class="nav-item {% if active=='reports' %}active{% endif %}">
      <span class="nav-icon">&#9783;</span> Reports
    </a>
  </nav>
  <div class="sidebar-footer">
    <form action="/logout" method="POST">
      <button class="btn-logout" type="submit">Sign Out</button>
    </form>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-title">{% block page_title %}Dashboard{% endblock %}</div>
    <div class="topbar-right">
      <span class="topbar-badge">LIVE</span>
      <!-- Theme Toggle -->
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light theme">
        <span id="themeIcon">☀️</span>
      </button>
    </div>
  </div>
  <div class="content-area">
    {% block content %}{% endblock %}
  </div>
</div>

<script src="/static/js/dashboard.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
